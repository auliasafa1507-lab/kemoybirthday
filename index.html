<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Kemoy 💖</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI';
  background:#ffc0cb;
}

/* SCREEN */
.screen {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100vh;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;
  padding:20px;

  opacity:0;
  transition:1s;
}

.active { opacity:1; z-index:1; }

/* LOADING */
#bar {
  width:70%;
  max-width:300px;
  height:12px;
  background:white;
  border-radius:10px;
  overflow:hidden;
}
#progress {
  width:0%;
  height:100%;
  background:#ff69b4;
}

/* PIN */
.pin-box {
  display:grid;
  grid-template-columns:repeat(3,80px);
  gap:12px;
}
.pin-btn {
  width:80px;
  height:80px;
  border-radius:50%;
  border:none;
  background:white;
  font-size:20px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}
#pinDisplay {
  letter-spacing:10px;
  font-size:26px;
  margin-bottom:20px;
}

/* LETTER (SURAT) */
.letter {
  width:90%;
  max-width:400px;
  background:#fffaf0;
  padding:25px;
  border-radius:15px;
  font-size:16px;
  line-height:1.7;
  text-align:left;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
  border:1px solid #f5d6c6;
  position:relative;
}
.letter::before {
  content:"";
  position:absolute;
  left:20px;
  top:0;
  width:2px;
  height:100%;
  background:#ffd6d6;
}

/* FOTO */
#fotoBox {
  position: relative;
  width:70vw;
  max-width:300px;
  height:70vw;
  max-height:300px;
}
.slide {
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:20px;
  opacity:0;
  transition:1s;
}

/* BUTTON */
button {
  margin-top:20px;
  padding:15px 30px;
  border-radius:30px;
  font-size:18px;
  border:none;
  background:#ff69b4;
  color:white;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

/* HEART */
.heart {
  position:fixed;
  top:-10px;
  animation:fall linear infinite;
}
@keyframes fall {
  to { transform:translateY(100vh); }
}
</style>
</head>

<body>

<audio id="bgm" loop>
<source src="Nadhif Basalamah - penjaga hati (Lirik).mp3">
</audio>

<!-- LOADING -->
<div class="screen active" id="loading">
  <h2>Loading for someone special 🤍</h2>
  <div id="bar"><div id="progress"></div></div>
</div>

<!-- PIN -->
<div class="screen" id="pin">
  <h2>Enter PIN 🤍</h2>
  <div id="pinDisplay">____</div>

  <div class="pin-box">
    <button class="pin-btn" onclick="press(1)">1</button>
    <button class="pin-btn" onclick="press(2)">2</button>
    <button class="pin-btn" onclick="press(3)">3</button>
    <button class="pin-btn" onclick="press(4)">4</button>
    <button class="pin-btn" onclick="press(5)">5</button>
    <button class="pin-btn" onclick="press(6)">6</button>
    <button class="pin-btn" onclick="press(7)">7</button>
    <button class="pin-btn" onclick="press(8)">8</button>
    <button class="pin-btn" onclick="press(9)">9</button>
    <button class="pin-btn" onclick="clearPin()">⌫</button>
    <button class="pin-btn" onclick="press(0)">0</button>
    <button class="pin-btn" onclick="checkPin()">✔</button>
  </div>
</div>

<!-- LETTER -->
<div class="screen" id="letter">
  <div class="letter" id="typedText"></div>
  <button onclick="show('gallery')">Next 💌</button>
</div>

<!-- FOTO -->
<div class="screen" id="gallery">
  <h2>Your Childhood 🤍</h2>

  <div id="fotoBox">
    <img class="slide" src="Screenshot_20260419-223241_Instagram.jpg">
    <img class="slide" src="Screenshot_20260419-223259_Instagram.jpg">
    <img class="slide" src="Screenshot_20260419-223255_Instagram.jpg">
    <img class="slide" src="Screenshot_20260419-223250_Instagram.jpg">
  </div>

  <button onclick="show('music')">Klik disinii 💌</button>
</div>

<!-- MUSIC -->
<div class="screen" id="music">
  <h2>Special song for you 💌</h2>

  <iframe src="https://open.spotify.com/embed/track/5y2ijHECwFYWqcAHKTZgzD" width="300" height="80"></iframe>
  <br>
  <iframe src="https://open.spotify.com/embed/track/273QnyCvJB65rScHJ1nPZb" width="300" height="80"></iframe>
</div>

<script>

// PLAY MUSIC
document.body.onclick=()=>bgm.play();

// LOADING
let p=0;
let load=setInterval(()=>{
  p++;
  progress.style.width=p+"%";
  if(p>=100){
    clearInterval(load);
    show("pin");
  }
},30);

// PIN
let pin="";
function press(n){
  if(pin.length<6){
    pin+=n;
    pinDisplay.innerText="•".repeat(pin.length);
  }
}
function clearPin(){
  pin=pin.slice(0,-1);
  pinDisplay.innerText="•".repeat(pin.length);
}
function checkPin(){
  if(pin=="200408"){
    show("letter");
    startTyping();
  } else alert("Wrong PIN 😢");
}

// SCREEN
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// TYPING
let text=`Happy Birthday, Kemoyy 🤍

Yeyy akhirnya hari ini datang juga...
hari spesialnya kemoyy. Aku seneng bangettt, karna tahun ini aku bisa ada di samping kamu, jadi bagian dari hari bahagia kamu. Rasanya 
bahagia banget bisa ngerayain ulang tahun kamu, orang yang sekarang punya tempat penting di hidup aku sekarang🥺

Kemoy… di umur kamu yang udah 18 tahun ini, aku berharap kamu bisa terus tumbuh jadi pribadi yang lebih dewasa, lebih tenang dalam menghadapi apapun, lebih kuat, dan lebih baik dari pribadi kamu kemarin. Semoga semua hal baik selalu datang ke kamu, satu per satu, dan semua yang kamu impikan bisa pelan pelan jadi kenyataan. Kamu pantas dapetin itu semua dan aku mau nemenin sampe kamu bisa raih itu semua💖

Aku juga mau minta maaf… karna aku sadar aku masih banyak kurangnya. Kadang aku belum bisa jadi yang terbaik buat kamu, kadang aku masih salah, masih kurang ngerti kamu. Tapi aku janji, aku bakal terus belajar, terus usaha, dan berusaha lebih dari yang aku bisa supaya kamu selalu ngerasa bahagia, ngerasa dihargai, dan ngerasa dicintai.

Thank you for being in my life, for staying, for choosing me. Kamu itu berarti banget buat aku, lebih dari yang bisa aku jelasin dengan kata kata.

Aku sayang banget sama kamu, Kemoy 🤍
Semoga hari ini, besok, dan seterusnya selalu penuh dengan kebahagiaan buat kamu. I love you to the moon and back, Kemoy🤍`;

let i=0;
function startTyping(){
  function type(){
    if(i<text.length){
      typedText.innerHTML+=text.charAt(i);
      i++;
      setTimeout(type,40);
    }
  }
  type();
}

// SLIDE
let slides=document.querySelectorAll(".slide");
let s=0;
setInterval(()=>{
  slides.forEach(e=>e.style.opacity=0);
  slides[s].style.opacity=1;
  s=(s+1)%slides.length;
},2000);

// HEART
setInterval(()=>{
  let h=document.createElement("div");
  h.className="heart";
  h.innerHTML="🤍";
  h.style.left=Math.random()*100+"vw";
  h.style.animationDuration=(Math.random()*2+3)+"s";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),5000);
},300);

</script>

</body>
</html>
